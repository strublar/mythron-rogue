<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Mythron Rogue</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
      /* TODO: add loading screen styles */
      #app {
        position: absolute;
        inset: 0;
        z-index: 10; /* React overlay sits above Phaser canvas */
        pointer-events: none; /* pass clicks through to canvas by default */
      }
      #app > * { pointer-events: auto; } /* re-enable for actual UI elements */
    </style>
  </head>
  <body>
    <!-- Phaser canvas is injected here by PhaserGame.ts -->
    <!-- React meta-loop overlay -->
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
